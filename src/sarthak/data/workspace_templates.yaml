# ── Research ──────────────────────────────────────────────────────────────────
research:
  directories:
    - literature
    - data/raw
    - data/processed
    - analysis
    - writing
    - figures
    - notes
    - .spaces/tasks

  readme_files:
    "literature/README.md": |
      # Literature

      Track papers with a structured reading log:

      | Paper | Year | Key Claim | Method | Gap | Relevance |
      |-------|------|-----------|--------|-----|-----------|

    "data/README.md": |
      # Data

      - `raw/`       — Original, immutable. Never modify.
      - `processed/` — Cleaned, transformed, analysis-ready.

      > Version data with DVC: `dvc add data/raw/dataset.csv`

    "writing/README.md": |
      # Writing

      Draft structure: Abstract → Introduction → Methods → Results → Discussion.

      > Write the methods section first — it clarifies what data you actually need.

    "figures/README.md": |
      # Figures

      Publication-quality figures. Always save programmatically:
      ```python
      plt.savefig('figures/fig1_results.pdf', dpi=300, bbox_inches='tight')
      ```

      Naming: `fig{N}_{description}.{pdf|png}`

    "analysis/README.md": |
      # Analysis

      One script/notebook per research question.

      Document: dataset version, random seed, environment snapshot.

      > Reproducibility rule: `dvc repro` should regenerate every result from scratch.

  starter_files: {}

  progress_md: |
    # Research Mastery Roadmap

    ## Foundation
    - [ ] Research methodology: hypothesis formation
    - [ ] Literature review and citation management
    - [ ] Python for data collection and cleaning

    ## Core
    - [ ] Statistical inference: hypothesis tests, confidence intervals
    - [ ] Reproducible research: version control, environments
    - [ ] Publication-quality data visualization

    ## Intermediate
    - [ ] Experiment design: power analysis, randomization
    - [ ] Advanced statistics: mixed models, Bayesian methods
    - [ ] Automated data pipelines

    ## Advanced
    - [ ] Meta-analysis and systematic review
    - [ ] ML for research acceleration
    - [ ] Open science: pre-registration, data sharing

