# Sarthak Workspace Templates
# Defines the expert directory structure, README files, and starter files
# created when a Space is initialized.
#
# Structure per space_type:
#   directories:  list of relative paths to create (parents auto-created)
#   readme_files: map of relative path → markdown content
#   starter_files: map of relative path → file content
#   progress_md:  content for .spaces/progress.md (the mastery roadmap tracker)
#
# Rules:
#   - Non-destructive: existing files are never overwritten (except progress.md which is idempotent)
#   - All paths are relative to the workspace root
#   - .gitkeep is written to every created empty directory automatically by the loader
#   - Shared sections (shared_readme, shared_starters) are merged before domain-specific ones
#
# To add a new domain template: add a new top-level key matching the SpaceType enum value.

# ── Shared defaults (merged into every template) ──────────────────────────────
shared:
  directories:
    - .spaces/tasks
    - notes

  readme_files:
    ".spaces/README.md": |
      # Sarthak Spaces

      Learning state managed by Sarthak AI. Do not delete.

      | File / Dir | Purpose |
      |---|---|
      | `sarthak.db` | Roadmap, SRS cards, notes (SQLite) |
      | `rag/` | Vector search index |
      | `tasks/` | Current and past learning tasks |
      | `progress.md` | Mastery tracker (auto-updated) |
      | `SOUL.md` | Agent identity for this space |
      | `MEMORY.md` | Long-term learner patterns |
      | `HEARTBEAT.md` | SRS due cards + streak |

  starter_files: {}

# ── Data Science & AI Engineering ─────────────────────────────────────────────
data_science:
  directories:
    - notebooks/exploration
    - notebooks/tutorials
    - experiments
    - projects
    - src
    - data/raw
    - data/processed
    - data/external
    - models
    - reports/figures
    - scripts
    - .spaces/tasks

  readme_files:
    "notebooks/README.md": |
      # Notebooks

      ## `exploration/` — Messy, disposable analysis. Move insights to `src/` when they solidify.
      ## `tutorials/` — One notebook per concept. Your personal textbook.

      > **Expert tip**: Use `marimo` for production notebooks — pure Python, git-diffs that make sense.
      > Keep Jupyter for exploration only.

      ```bash
      # Start marimo
      marimo edit notebooks/tutorials/your_notebook.py
      ```

    "experiments/README.md": |
      # Experiments

      Every ML experiment gets a folder: `YYYY-MM-DD_concept_variant/`

      Track everything with **MLflow**:

      ```python
      import mlflow
      mlflow.set_experiment('gradient_descent')
      with mlflow.start_run():
          mlflow.log_param('lr', 0.01)
          mlflow.log_metric('val_loss', 0.23)
          mlflow.log_artifact('reports/figures/loss_curve.png')
      ```

      > Never run an experiment without logging it. Future-you will thank you.

    "src/README.md": |
      # Source Code

      Production-quality Python only. Extracted from notebooks when concepts solidify.

      ```
      src/
        data/       # data loading & preprocessing
        features/   # feature engineering
        models/     # model definitions & training
        evaluate/   # metrics, visualizations, reports
      ```

      > Expert rule: If you use it twice, it goes in `src/`.

    "data/README.md": |
      # Data

      - `raw/`        → **Never modify.** Original source data, immutable.
      - `processed/`  → Cleaned, transformed, ready for modeling.
      - `external/`   → Third-party reference datasets.

      > **Expert tip**: Use DuckDB to query without loading into memory:
      > ```python
      > import duckdb
      > duckdb.sql("SELECT * FROM 'data/raw/file.csv' LIMIT 5").df()
      > ```

    "models/README.md": |
      # Models

      Saved artifacts, weights, and metadata.

      Naming: `model_name_v1_YYYY-MM-DD.pkl`

      Always save metadata alongside the model:
      ```python
      import joblib, json
      joblib.dump(model, 'models/lr_v1.pkl')
      json.dump({'features': list(X.columns), 'val_score': 0.89},
                open('models/lr_v1_meta.json', 'w'))
      ```

    "reports/README.md": |
      # Reports

      Final analyses, presentations, and publication-ready figures.

      > Always save figures programmatically — never screenshot:
      > ```python
      > plt.savefig('reports/figures/loss_curve.png', dpi=150, bbox_inches='tight')
      > ```

    "projects/README.md": |
      # Projects

      Real end-to-end projects. Each subfolder is a complete, shareable project.

      This is your portfolio. Every project you complete goes here.

      > Expert insight: Projects teach 10x more than isolated exercises.
      > They force you to integrate concepts, debug real issues, and make decisions.

  starter_files:
    "pyproject.toml": |
      [project]
      name = "ai-ds-workspace"
      version = "0.1.0"
      requires-python = ">=3.11"
      dependencies = [
          "numpy", "pandas", "polars",
          "scikit-learn", "matplotlib", "seaborn",
          "jupyter", "duckdb", "mlflow", "rich",
      ]

      [tool.ruff]
      line-length = 100

      [tool.ruff.lint]
      select = ["E", "F", "I"]

    ".editorconfig": |
      root = true

      [*.py]
      indent_style = space
      indent_size = 4
      end_of_line = lf
      charset = utf-8
      trim_trailing_whitespace = true
      insert_final_newline = true

    "scripts/setup_env.sh": |
      #!/usr/bin/env bash
      # Setup your expert DS/AI environment
      set -e

      echo '🚀 Setting up Sarthak AI/DS workspace...'

      command -v uv >/dev/null 2>&1 || \
          curl -LsSf https://astral.sh/uv/install.sh | sh

      uv sync
      uv add polars duckdb marimo mlflow rich
      uv add --dev ruff pytest hypothesis

      echo '✅ Expert environment ready!'
      echo 'Run: marimo edit notebooks/tutorials/start_here.py'

    "scripts/setup_env.ps1": |
      # Setup your expert DS/AI environment on Windows
      Write-Host '🚀 Setting up Sarthak AI/DS workspace...'

      if (-not (Get-Command uv -ErrorAction SilentlyContinue)) {
          irm https://astral.sh/uv/install.ps1 | iex
      }

      uv sync
      uv add polars duckdb marimo mlflow rich
      uv add --dev ruff pytest hypothesis

      Write-Host '✅ Expert environment ready!'

    ".gitignore": |
      # Python
      __pycache__/
      *.pyc
      *.pyo
      .venv/
      dist/
      build/
      *.egg-info/

      # Data (track with DVC instead)
      data/raw/
      data/processed/
      models/*.pkl
      models/*.pt

      # Jupyter
      .ipynb_checkpoints/

      # MLflow
      mlruns/

      # Environment
      .env
      *.env

  progress_md: |
    # Mastery Roadmap

    Auto-updated by Sarthak after each session.

    ## 🔵 Foundation
    - [ ] Python basics
    - [ ] NumPy
    - [ ] Pandas
    - [ ] Statistics

    ## 🟡 Core ML
    - [ ] Linear regression (derive)
    - [ ] Gradient descent (implement)
    - [ ] scikit-learn pipelines

    ## 🟠 Deep Learning
    - [ ] Neural networks from scratch
    - [ ] Backpropagation
    - [ ] PyTorch

    ## 🔴 Advanced
    - [ ] Transformers
    - [ ] MLOps
    - [ ] Production deployment

    ## 🏆 Expert
    - [ ] Research replication
    - [ ] Custom architectures

# AI Engineering shares the same template as Data Science
ai_engineering:
  extends: data_science

# ── Exam Prep ─────────────────────────────────────────────────────────────────
exam_prep:
  directories:
    - subjects
    - flashcards
    - mock_tests
    - weak_areas
    - notes
    - previous_years
    - .spaces/tasks

  readme_files:
    "subjects/README.md": |
      # Subjects

      One folder per subject. Organize by chapter inside each subject folder.

      Name chapters: `01_topic_name/`, `02_topic_name/` for ordered study.

    "flashcards/README.md": |
      # Flashcards

      Use **Anki** for spaced repetition — the most evidence-backed memorization tool.

      Export your deck after each study session.

      > Research shows: spaced repetition beats re-reading by 200–400%.

    "mock_tests/README.md": |
      # Mock Tests

      Rules for effective mock testing:
      1. Full length, timed, no interruptions.
      2. Immediately analyse every wrong answer.
      3. Log error type: conceptual / careless / time-pressure.
      4. Only errors in `weak_areas/` get re-studied.

    "weak_areas/README.md": |
      # Weak Areas

      Track your error patterns here. Fix the root cause, not the symptom.

      Template per entry:
      `topic | error_type | fix | date_resolved`

    "previous_years/README.md": |
      # Previous Year Papers

      Solve under timed, exam conditions — not as casual reading.

      After each paper: log score, time taken, and top-3 weak areas.

  starter_files:
    "notes/template.md": |
      # Topic: [Name]

      ## Core Concept

      ## Key Formulas

      ## Common Mistakes

      ## Practice Questions

      ## Connections to Other Topics

  progress_md: |
    # Exam Prep Roadmap

    ## Phase 1: Foundation
    - [ ] Understand exam pattern
    - [ ] Build study schedule using spaced repetition

    ## Phase 2: Core Subjects
    - [ ] Subject-by-subject coverage (one chapter at a time)

    ## Phase 3: Practice
    - [ ] Previous year question pattern analysis
    - [ ] Timed topic-wise tests

    ## Phase 4: Weak Area Elimination
    - [ ] Error log review
    - [ ] Targeted drilling on weak areas

    ## Phase 5: Peak Performance
    - [ ] Full-length mock tests under exam conditions
    - [ ] Speed + accuracy calibration

# ── Medicine ──────────────────────────────────────────────────────────────────
