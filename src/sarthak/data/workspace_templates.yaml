      De-identification standard: HIPAA Safe Harbor (18 identifiers removed).

    "literature/README.md": |
      # Literature

      Track papers with a structured reading log:

      | Paper | Year | Key Claim | Method | Gap | Relevance |
      |-------|------|-----------|--------|-----|-----------|

    "notebooks/README.md": |
      # Notebooks

      - `eda/`      — Exploratory data analysis on clinical datasets
      - `modeling/` — Model development and validation notebooks

      > Always document: dataset version, preprocessing steps, patient cohort definition.

    "src/README.md": |
      # Source Code

      Production-quality clinical ML code.

      Structure:
      ```
      src/
        data/     # data loading and de-identification
        features/ # clinical feature engineering
        models/   # model training and validation
        eval/     # metrics: AUC, calibration, fairness subgroups
      ```

  starter_files: {}

  progress_md: |
    # Medical AI Mastery Roadmap

    ## Foundation
    - [ ] Clinical data types and EHR structure
    - [ ] Biostatistics: sensitivity, specificity, ROC curves
    - [ ] Python for clinical data (MIMIC demo)

    ## Core Skills
    - [ ] Survival analysis (Kaplan-Meier)
    - [ ] Clinical NLP (named entity recognition)
    - [ ] Medical imaging preprocessing (DICOM)

    ## Advanced
    - [ ] CNN for X-ray classification
    - [ ] Federated learning theory
    - [ ] AI fairness and subgroup analysis

    ## Expert
    - [ ] Causal inference for clinical decisions
    - [ ] FDA SaMD regulatory guidance
    - [ ] Production clinical ML system

# ── Software Engineering ───────────────────────────────────────────────────────
software_engineering:
  directories:
    - src
    - tests
    - docs
    - scripts
    - infra
    - notes
    - .spaces/tasks

  readme_files:
    "src/README.md": |
      # Source Code

      Production-quality code. Follow the single-responsibility principle.

      ```
      src/
        api/        # HTTP layer (routes, schemas, middleware)
        core/       # Business logic — no I/O
        infra/      # DB, cache, external services
        workers/    # Background jobs
      ```

      > Expert rule: The `core/` layer must never import from `api/` or `infra/`.

    "tests/README.md": |
      # Tests

      Test pyramid: many unit tests, fewer integration, few E2E.

      ```bash
      # Run all tests
      pytest -x --tb=short

      # Watch mode
      pytest-watch
      ```

      > Aim: 80%+ coverage on `core/`. Zero tolerance for untested business logic.

    "notes/README.md": |
      # Architecture Notes

      Record design decisions (ADRs) here.

      Format: `YYYY-MM-DD_decision_title.md`

      Each ADR: Context → Decision → Consequences.

    "docs/README.md": |
      # Documentation

      - `api/`       — API reference (auto-generated)
      - `guides/`    — How-to guides
      - `adr/`       — Architecture decision records

    "infra/README.md": |
      # Infrastructure

      Infrastructure-as-code: Docker, Kubernetes manifests, Terraform configs.

      > Rule: Every service runs locally with `docker compose up`. No exceptions.

  starter_files:
    ".editorconfig": |
      root = true

      [*.py]
      indent_style = space
      indent_size = 4
      charset = utf-8
      insert_final_newline = true

    ".gitignore": |
      # Python
      __pycache__/
      *.pyc
      .venv/
      dist/
      build/
      *.egg-info/

      # Env
      .env
      *.env

      # IDE
      .vscode/
      .idea/

  progress_md: |
    # Software Engineering Mastery Roadmap

    ## Foundation
    - [ ] Git fundamentals (commit, branch, merge, rebase)
    - [ ] Testing basics: unit tests with pytest
    - [ ] REST APIs: HTTP verbs, status codes, JSON

    ## Core
    - [ ] Design patterns (Factory, Observer, Strategy)
    - [ ] SQL: joins, indexes, EXPLAIN
    - [ ] Docker + CI/CD pipeline

    ## Intermediate
    - [ ] System design: load balancing, caching, queues
    - [ ] Async Python: asyncio, concurrency models
    - [ ] Database internals: B-trees, WAL, MVCC

    ## Advanced
    - [ ] Distributed systems: Raft, CAP theorem
    - [ ] Observability: tracing, structured logging, SLOs
    - [ ] Performance engineering: profiling, CPython GIL

    ## Expert
    - [ ] Platform engineering: Kubernetes, GitOps
    - [ ] Large-scale refactoring (100k+ line codebases)

