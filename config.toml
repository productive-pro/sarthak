# Sarthak AI — Configuration
# Single source of truth. All services read this via src/config.py

[general]
project_name = "sarthak"
data_dir = "~/.local/share/sarthak"
log_level = "INFO"           # DEBUG | INFO | WARNING | ERROR
log_format = "json"          # json | console

# [database] section removed — PostgreSQL is no longer used.

[storage]
# ── Relational backend ──────────────────────────────────────────────────────
# backend = "sqlite"     ← default, zero extra deps
# backend = "postgres"   ← requires: pip install sarthak[postgres]
# backend = "duckdb"     ← requires: pip install sarthak[duckdb]
# backend = "libsql"     ← requires: pip install sarthak[libsql]  (Turso cloud)
backend = "sqlite"

# ── Vector / RAG backend ────────────────────────────────────────────────────
# vector_backend = "sqlite_vec"  ← default, zero extra deps
# vector_backend = "qdrant"      ← requires: pip install sarthak[qdrant]
# vector_backend = "chroma"      ← requires: pip install sarthak[chroma]
# vector_backend = "pgvector"    ← requires: pip install sarthak[pgvector]
# vector_backend = "lancedb"     ← requires: pip install sarthak[lancedb]
# vector_backend = "weaviate"    ← requires: pip install sarthak[weaviate]
vector_backend = "sqlite_vec"

# ── Backend connection config (only used when backend is set above) ─────────
[storage.postgres]
url       = ""        # postgresql+asyncpg://user:pass@host/db
pool_size = 5

[storage.libsql]
url        = "file://~/.sarthak_ai/sarthak.db"   # or libsql://<db>.turso.io
auth_token = ""

[storage.duckdb]
path = "~/.sarthak_ai/sarthak.duckdb"

[storage.qdrant]
url               = "http://localhost:6333"
api_key           = ""
collection_prefix = "sarthak"

[storage.chroma]
persist_directory = "~/.sarthak_ai/chroma"
host              = ""    # set for remote HTTP client
port              = 8000

[storage.lancedb]
uri = "~/.sarthak_ai/lancedb"    # or s3://bucket/path

[storage.weaviate]
url       = "http://localhost:8080"
api_key   = ""
grpc_port = 50051

[storage.redis]
url         = ""    # redis://localhost:6379/0  — leave blank for in-process LRU
default_ttl = 300

[encryption]
enabled = true
algorithm = "AES-GCM"       # do not change after first write

[ai]
# Provider priority: first available + configured is used
default_provider = "ollama"   # ollama | openai | anthropic | groq | gemini | openrouter
default_model = "gemma3:4b"

[ai.ollama]
base_url = "http://localhost:11434/v1"
text_model = "gemma3:4b"
vision_model = "qwen3-vl"
timeout = 60

[ai.openai]
model = "gpt-4o-mini"
base_url = ""
timeout = 30

[ai.gemini]
model = "gemini-2.0-flash"
timeout = 30

[ai.anthropic]
model = "claude-3-5-haiku-20241022"
timeout = 30

[ai.openrouter]
model = "anthropic/claude-3.5-sonnet"
timeout = 30
app_url = "https://github.com/productive-pro/sarthak"
app_title = "Sarthak AI"

[ai.grok]
model = "grok-2"
timeout = 30
base_url = "https://api.x.ai/v1"

[ai.huggingface]
model = "Qwen/Qwen2.5-Coder-32B-Instruct"
timeout = 30

[ai.github-copilot]
# GitHub Copilot provider — authenticate with: sarthak copilot login
# Optional: set a raw Copilot token here (or use GITHUB_COPILOT_TOKEN env var)
# token = ""    # overrides device-flow auth when set
model = "gpt-4o"
timeout = 30

[ai.custom]
compat = "openai"          # openai | anthropic
base_url = ""
model = "gpt-4o-mini"
timeout = 30

[ai.fallback]
# Fallback model chain: if the primary model fails (4xx/5xx or empty response),
# Sarthak tries fallback1, then fallback2. Leave blank to disable.
fallback1_provider = "ollama"
fallback1_model    = "gemma3:4b"
fallback2_provider = ""
fallback2_model    = ""

[ai.classify]
# Activity classifier
provider = "ollama"
model = "gemma3:4b"
categories = [
    "coding", "browsing", "reading", "communication",
    "design", "debugging", "research", "admin", "idle", "unknown",
]

[ai.embeddings]
# Embedding model for RAG indexing and search.
# Format: "provider:model-id"
# Free local option (recommended): ollama:nomic-embed-text  (768-dim, run: ollama pull nomic-embed-text)
# Cloud option: openai:text-embedding-3-small  (1536-dim, requires openai api_key)
model = "ollama:nomic-embed-text"
# Uncomment to use a cloud provider instead:
# model = "openai:text-embedding-3-small"

[ai.cache]
enabled = true
cache_dir = "~/.sarthak_ai/data/cache"
ttl_seconds = 3600            # 1 hour

[tui]
refresh_interval = 5          # seconds
theme = "tokyo"
max_event_rows = 200
font = "JetBrainsMono Nerd Font"

[web]
enabled = true
host = "127.0.0.1"
port = 4848

[mcp]
# MCP server config — used by opencode, gemini-cli, claude-code, openclaw
enabled = true
transport = "stdio"

[telegram]
enabled = false
# bot_token = "ENC:..."   # encrypt with: sarthak encrypt <your-token>
# allowed_user_id = 123456789  # your Telegram user ID (get it from @userinfobot)
timeout_seconds = 60

[stt]
# Unified Speech-to-Text configuration.
# provider options: whisper | openai | groq | deepgram | assemblyai
provider  = "whisper"   # active provider
language  = "auto"      # spoken language code ("en", "fr", …) or "auto"

[stt.whisper]
# Local whisper.cpp via whisper-cli. Run: python scripts/install-whisper.py
model      = "base.en"  # ggml-base.en.bin; or set model_path for a custom file
model_path = ""          # absolute path to a .bin file; overrides model when set
device     = "CPU"       # --ov-e-device: CPU | GPU | NPU
beam_size  = 5           # 1 = fastest, 5 = whisper default
threads    = 0           # CPU threads (0 = whisper-cli default)

[stt.openai]
# OpenAI Whisper API (or any OpenAI-compatible endpoint)
api_key   = ""           # or set env OPENAI_API_KEY
model     = "whisper-1"
base_url  = ""           # override for Azure / compatible endpoints

[stt.groq]
# Groq Whisper — very fast, generous free tier
api_key   = ""           # or set env GROQ_API_KEY
model     = "whisper-large-v3-turbo"

[stt.deepgram]
# Deepgram Nova-2 — streaming-capable, high accuracy
api_key   = ""           # or set env DEEPGRAM_API_KEY
model     = "nova-2"
tier      = ""           # optional tier override

[stt.assemblyai]
# AssemblyAI Universal-2
api_key   = ""           # or set env ASSEMBLYAI_API_KEY

[whisper]
# Legacy section — kept for backwards compatibility.
# Prefer [stt.whisper] above for new installs.
model     = "base.en"   # ggml-base.en.bin in models_dir; or set model_path for a custom location
model_path = ""          # absolute path to a .bin file; overrides model when set
device    = "CPU"        # --ov-e-device: CPU | GPU | NPU
beam_size = 5            # --beam-size: 1 = fastest, 5 = whisper default
threads   = 0            # -t: CPU threads (0 = whisper-cli default)
language  = "auto"       # -l: spoken language code (en, fr, de …) or "auto"

[whatsapp]
# ── neonize QR-login bot ─────────────────────────────────────────────────────
enabled  = false
mode     = "qr"           # only mode supported: qr (personal account via neonize)
jid      = ""             # set automatically after QR scan (your phone number)

# ── Behaviour ────────────────────────────────────────────────────────────────
push_name         = "Sarthak"   # display name shown to contacts
allow_groups      = false       # accept messages from group chats
send_presence     = false       # appear online/available during active sessions
send_read_receipt = true        # mark messages read after replying
auto_reject_calls = true        # auto-reject incoming calls (prevents bot hang)

# ── Reconnect backoff ────────────────────────────────────────────────────────
reconnect_backoff_init = 5      # initial wait (s) before reconnect attempt
reconnect_backoff_max  = 300    # max wait (s) between reconnect attempts

# ── QR session ───────────────────────────────────────────────────────────────
session_timeout = 120           # seconds to wait for QR scan in configure wizard

# ── Network ──────────────────────────────────────────────────────────────────
proxy = ""                      # HTTP/SOCKS5 proxy URL, e.g. socks5://127.0.0.1:9050
