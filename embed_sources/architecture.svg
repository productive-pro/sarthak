<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 900" width="1400" height="900">
  <defs>
    <!-- Background gradient -->
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0a0c10"/>
      <stop offset="100%" stop-color="#0d1117"/>
    </linearGradient>

    <!-- Card glows -->
    <filter id="glow-blue" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
    <filter id="glow-green" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>

    <!-- Subtle grid pattern -->
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#ffffff" stroke-width="0.15" opacity="0.06"/>
    </pattern>

    <!-- Arrow markers -->
    <marker id="arr-blue" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#3b82f6" opacity="0.8"/>
    </marker>
    <marker id="arr-dim" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#374151"/>
    </marker>

    <!-- Card base -->
    <linearGradient id="card-ui" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#161b22"/>
      <stop offset="100%" stop-color="#0d1117"/>
    </linearGradient>
    <linearGradient id="card-orch" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0f1f3d"/>
      <stop offset="100%" stop-color="#0a1628"/>
    </linearGradient>
    <linearGradient id="card-ai" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#16200d"/>
      <stop offset="100%" stop-color="#0d1510"/>
    </linearGradient>
    <linearGradient id="card-agent" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1e1409"/>
      <stop offset="100%" stop-color="#130e06"/>
    </linearGradient>
    <linearGradient id="card-space" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#18102a"/>
      <stop offset="100%" stop-color="#10091c"/>
    </linearGradient>
    <linearGradient id="card-store" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#161b22"/>
      <stop offset="100%" stop-color="#0d1117"/>
    </linearGradient>

    <!-- Clip -->
    <clipPath id="round-clip">
      <rect width="200" height="200" rx="12"/>
    </clipPath>
  </defs>

  <!-- Background -->
  <rect width="1400" height="900" fill="url(#bg)"/>
  <rect width="1400" height="900" fill="url(#grid)"/>

  <!-- ═══════════════════════════════════════════════════════════ -->
  <!-- TITLE BLOCK -->
  <!-- ═══════════════════════════════════════════════════════════ -->
  <text x="700" y="44" text-anchor="middle"
        font-family="'SF Mono', 'Fira Code', monospace" font-size="13" letter-spacing="6"
        fill="#3b82f6" opacity="0.7">SYSTEM ARCHITECTURE</text>
  <text x="700" y="76" text-anchor="middle"
        font-family="Georgia, 'Times New Roman', serif" font-size="33" font-weight="700"
        fill="#e6edf3" letter-spacing="-0.5">Sarthak AI</text>
  <text x="700" y="98" text-anchor="middle"
        font-family="'SF Mono', 'Fira Code', monospace" font-size="13" letter-spacing="2"
        fill="#4b5563">Local-first · Privacy-native · Self-hosted</text>

  <!-- Divider -->
  <line x1="560" y1="112" x2="840" y2="112" stroke="#1f2937" stroke-width="1"/>
  <circle cx="700" cy="112" r="3" fill="#1f2937"/>

  <!-- ═══════════════════════════════════════════════════════════ -->
  <!-- ROW 1: USER INTERFACES  ·  ORCHESTRATOR  ·  AI PROVIDERS -->
  <!-- ═══════════════════════════════════════════════════════════ -->

  <!-- ── User Interfaces (left) ── -->
  <rect x="60" y="140" width="240" height="220" rx="12" fill="url(#card-ui)" stroke="#21262d" stroke-width="1"/>
  <rect x="60" y="140" width="240" height="3" rx="1.5" fill="#6b7280" opacity="0.5"/>
  <!-- dot badge -->
  <circle cx="82" cy="164" r="4" fill="#22c55e" opacity="0.8"/>
  <text x="96" y="168" font-family="'SF Mono','Fira Code',monospace" font-size="11" letter-spacing="3" fill="#6b7280">INTERFACES</text>

  <text x="180" y="200" text-anchor="middle" font-family="Georgia,serif" font-size="17" font-weight="600" fill="#e6edf3">User Interfaces</text>

  <!-- items -->
  <g font-family="'SF Mono','Fira Code',monospace" font-size="14" fill="#8b949e">
    <text x="96" y="228">▸ Web UI</text>
    <text x="96" y="250">▸ Terminal TUI</text>
    <text x="96" y="272">▸ CLI</text>
    <text x="96" y="294">▸ Telegram Bot</text>
    <text x="96" y="316">▸ MCP Server</text>
  </g>

  <!-- ── Orchestrator (center) ── -->
  <rect x="500" y="140" width="400" height="220" rx="12" fill="url(#card-orch)" stroke="#1d4ed8" stroke-width="1" opacity="0.9"/>
  <rect x="500" y="140" width="400" height="3" rx="1.5" fill="#3b82f6" opacity="0.7"/>
  <circle cx="522" cy="164" r="4" fill="#3b82f6" opacity="0.9"/>
  <text x="536" y="168" font-family="'SF Mono','Fira Code',monospace" font-size="11" letter-spacing="3" fill="#3b82f6" opacity="0.8">ORCHESTRATOR</text>

  <text x="700" y="200" text-anchor="middle" font-family="Georgia,serif" font-size="17" font-weight="600" fill="#e6edf3">Orchestrator</text>

  <g font-family="'SF Mono','Fira Code',monospace" font-size="14" fill="#93c5fd" text-anchor="middle">
    <text x="700" y="232">route( ) · ask_orchestrator( )</text>
    <text x="700" y="255">tool / agent routing</text>
    <text x="700" y="278">model selection · context inject</text>
    <text x="700" y="301">provider fallback · streaming</text>
  </g>

  <!-- ── AI Providers (right) ── -->
  <rect x="1100" y="140" width="240" height="220" rx="12" fill="url(#card-ai)" stroke="#16a34a" stroke-width="1" opacity="0.8"/>
  <rect x="1100" y="140" width="240" height="3" rx="1.5" fill="#22c55e" opacity="0.6"/>
  <circle cx="1122" cy="164" r="4" fill="#22c55e" opacity="0.8"/>
  <text x="1136" y="168" font-family="'SF Mono','Fira Code',monospace" font-size="11" letter-spacing="3" fill="#6b7280">PROVIDERS</text>

  <text x="1220" y="200" text-anchor="middle" font-family="Georgia,serif" font-size="17" font-weight="600" fill="#e6edf3">AI Providers</text>

  <g font-family="'SF Mono','Fira Code',monospace" font-size="14" fill="#8b949e">
    <text x="1136" y="228">▸ Ollama (local)</text>
    <text x="1136" y="250">▸ OpenAI</text>
    <text x="1136" y="272">▸ Anthropic</text>
    <text x="1136" y="294">▸ Gemini · Groq</text>
    <text x="1136" y="316">▸ OpenRouter</text>
  </g>

  <!-- ═══════════════════════════════════════════════════════════ -->
  <!-- FLOW: UI → Orch → Providers  (row 1 arrows) -->
  <!-- ═══════════════════════════════════════════════════════════ -->
  <!-- UI → Orch -->
  <line x1="302" y1="250" x2="498" y2="250" stroke="#3b82f6" stroke-width="1.2" stroke-dasharray="5 4" marker-end="url(#arr-blue)" opacity="0.6"/>
  <!-- Orch → Providers -->
  <line x1="902" y1="250" x2="1098" y2="250" stroke="#3b82f6" stroke-width="1.2" stroke-dasharray="5 4" marker-end="url(#arr-blue)" opacity="0.6"/>

  <!-- ═══════════════════════════════════════════════════════════ -->
  <!-- ROW 2: AGENT EXECUTION LOOP  (full width) -->
  <!-- ═══════════════════════════════════════════════════════════ -->

  <!-- Vertical connector: Orch → Loop -->
  <line x1="700" y1="362" x2="700" y2="400" stroke="#3b82f6" stroke-width="1.2" stroke-dasharray="5 4" marker-end="url(#arr-blue)" opacity="0.6"/>

  <rect x="60" y="400" width="1280" height="120" rx="12" fill="url(#card-orch)" stroke="#1d4ed8" stroke-width="1" opacity="0.7"/>
  <rect x="60" y="400" width="1280" height="3" rx="1.5" fill="#3b82f6" opacity="0.5"/>

  <text x="700" y="428" text-anchor="middle" font-family="'SF Mono','Fira Code',monospace" font-size="11" letter-spacing="4" fill="#3b82f6" opacity="0.8">AGENT EXECUTION LOOP</text>

  <!-- 5-step pipeline -->
  <g font-family="'SF Mono','Fira Code',monospace">
    <!-- step labels -->
    <text x="190" y="462" text-anchor="middle" font-size="12" fill="#4b5563" letter-spacing="2">01</text>
    <text x="190" y="480" text-anchor="middle" font-size="15" fill="#e6edf3">Message In</text>
    <text x="190" y="497" text-anchor="middle" font-size="12" fill="#6b7280">Input parsing</text>

    <text x="445" y="462" text-anchor="middle" font-size="12" fill="#4b5563" letter-spacing="2">02</text>
    <text x="445" y="480" text-anchor="middle" font-size="15" fill="#e6edf3">Memory Recall</text>
    <text x="445" y="497" text-anchor="middle" font-size="12" fill="#6b7280">Vector + SQLite</text>

    <text x="700" y="462" text-anchor="middle" font-size="12" fill="#4b5563" letter-spacing="2">03</text>
    <text x="700" y="480" text-anchor="middle" font-size="15" fill="#93c5fd">LLM Reasoning</text>
    <text x="700" y="497" text-anchor="middle" font-size="12" fill="#6b7280">Prompt + context</text>

    <text x="955" y="462" text-anchor="middle" font-size="12" fill="#4b5563" letter-spacing="2">04</text>
    <text x="955" y="480" text-anchor="middle" font-size="15" fill="#e6edf3">Tool Execution</text>
    <text x="955" y="497" text-anchor="middle" font-size="12" fill="#6b7280">MCP · sandbox</text>

    <text x="1210" y="462" text-anchor="middle" font-size="12" fill="#4b5563" letter-spacing="2">05</text>
    <text x="1210" y="480" text-anchor="middle" font-size="15" fill="#e6edf3">Response Out</text>
    <text x="1210" y="497" text-anchor="middle" font-size="12" fill="#6b7280">Stream / notify</text>
  </g>

  <!-- step connectors inside loop -->
  <g stroke="#1e3a5f" stroke-width="1" stroke-dasharray="3 3" marker-end="url(#arr-dim)">
    <line x1="280" y1="480" x2="355" y2="480"/>
    <line x1="540" y1="480" x2="615" y2="480"/>
    <line x1="790" y1="480" x2="865" y2="480"/>
    <line x1="1045" y1="480" x2="1120" y2="480"/>
  </g>

  <!-- ═══════════════════════════════════════════════════════════ -->
  <!-- ROW 3: SPACES ENGINE  ·  AGENT ENGINE -->
  <!-- ═══════════════════════════════════════════════════════════ -->

  <!-- Vertical connectors from loop -->
  <line x1="350" y1="522" x2="350" y2="560" stroke="#a855f7" stroke-width="1.2" stroke-dasharray="5 4" marker-end="url(#arr-blue)" opacity="0.5"/>
  <line x1="1050" y1="522" x2="1050" y2="560" stroke="#f59e0b" stroke-width="1.2" stroke-dasharray="5 4" marker-end="url(#arr-blue)" opacity="0.5"/>

  <!-- ── Spaces Learning Engine ── -->
  <rect x="60" y="560" width="580" height="230" rx="12" fill="url(#card-space)" stroke="#7e22ce" stroke-width="1" opacity="0.9"/>
  <rect x="60" y="560" width="580" height="3" rx="1.5" fill="#a855f7" opacity="0.6"/>
  <circle cx="82" cy="584" r="4" fill="#a855f7" opacity="0.8"/>
  <text x="96" y="588" font-family="'SF Mono','Fira Code',monospace" font-size="11" letter-spacing="3" fill="#a855f7" opacity="0.8">SPACES LEARNING ENGINE</text>

  <text x="350" y="618" text-anchor="middle" font-family="Georgia,serif" font-size="17" font-weight="600" fill="#e6edf3">Learning Engine</text>

  <!-- two-column items -->
  <g font-family="'SF Mono','Fira Code',monospace" font-size="13.5" fill="#8b949e">
    <text x="96" y="650">▸ CurriculumAgent</text>
    <text x="96" y="671">▸ MathAgent</text>
    <text x="96" y="692">▸ TaskBuilderAgent</text>
    <text x="96" y="713">▸ AssessmentAgent</text>

    <text x="370" y="650">▸ WorkspaceAnalyser</text>
    <text x="370" y="671">▸ EngagementAgent</text>
    <text x="370" y="692">▸ Recommendation</text>
    <text x="370" y="713">▸ Daily Digest</text>
  </g>

  <!-- SRS badge -->
  <rect x="96" y="730" width="460" height="38" rx="8" fill="#1a0f2e" stroke="#7e22ce" stroke-width="1" opacity="0.8"/>
  <text x="326" y="754" text-anchor="middle" font-family="'SF Mono','Fira Code',monospace" font-size="14" fill="#c4b5fd">Spaced Repetition System (SRS) · SM-2 algorithm</text>

  <!-- ── Agent Engine ── -->
  <rect x="760" y="560" width="580" height="230" rx="12" fill="url(#card-agent)" stroke="#b45309" stroke-width="1" opacity="0.9"/>
  <rect x="760" y="560" width="580" height="3" rx="1.5" fill="#f59e0b" opacity="0.6"/>
  <circle cx="782" cy="584" r="4" fill="#f59e0b" opacity="0.8"/>
  <text x="796" y="588" font-family="'SF Mono','Fira Code',monospace" font-size="11" letter-spacing="3" fill="#f59e0b" opacity="0.8">AGENT ENGINE</text>

  <text x="1050" y="618" text-anchor="middle" font-family="Georgia,serif" font-size="17" font-weight="600" fill="#e6edf3">Agent Engine</text>

  <g font-family="'SF Mono','Fira Code',monospace" font-size="13.5" fill="#8b949e">
    <text x="796" y="650">▸ Agent Creator</text>
    <text x="796" y="671">▸ Agent Scheduler</text>
    <text x="796" y="692">▸ Agent Runner</text>
    <text x="796" y="713">▸ Cron Jobs</text>

    <text x="1050" y="650">▸ Sandbox Execution</text>
    <text x="1050" y="671">▸ Notifications</text>
    <text x="1050" y="692">▸ Analytics Modules</text>
    <text x="1050" y="713">▸ Focus Session Tracker</text>
  </g>

  <!-- Whisper badge -->
  <rect x="796" y="730" width="460" height="38" rx="8" fill="#1c1004" stroke="#b45309" stroke-width="1" opacity="0.8"/>
  <text x="1026" y="754" text-anchor="middle" font-family="'SF Mono','Fira Code',monospace" font-size="14" fill="#fcd34d">Whisper voice · GPU-accelerated · wtype output</text>

  <!-- ═══════════════════════════════════════════════════════════ -->
  <!-- ROW 4: STORAGE (full width) -->
  <!-- ═══════════════════════════════════════════════════════════ -->

  <!-- Vertical connectors to storage -->
  <line x1="350" y1="792" x2="490" y2="830" stroke="#374151" stroke-width="1" stroke-dasharray="4 4" marker-end="url(#arr-dim)" opacity="0.7"/>
  <line x1="1050" y1="792" x2="910" y2="830" stroke="#374151" stroke-width="1" stroke-dasharray="4 4" marker-end="url(#arr-dim)" opacity="0.7"/>

  <rect x="320" y="830" width="760" height="52" rx="12" fill="url(#card-store)" stroke="#21262d" stroke-width="1"/>
  <rect x="320" y="830" width="760" height="3" rx="1.5" fill="#22c55e" opacity="0.35"/>

  <text x="700" y="852" text-anchor="middle" font-family="'SF Mono','Fira Code',monospace" font-size="11" letter-spacing="4" fill="#4b5563">STORAGE</text>
  <text x="700" y="869" text-anchor="middle" font-family="'SF Mono','Fira Code',monospace" font-size="14" fill="#6b7280">SQLite · JSON · Vector DB · Agent Run Logs</text>

  <!-- ═══════════════════════════════════════════════════════════ -->
  <!-- LEGEND -->
  <!-- ═══════════════════════════════════════════════════════════ -->
  <g font-family="'SF Mono','Fira Code',monospace" font-size="12" fill="#4b5563">
    <circle cx="1300" cy="845" r="4" fill="#3b82f6" opacity="0.8"/>
    <text x="1310" y="849">data flow</text>
    <line x1="1296" y1="864" x2="1310" y2="864" stroke="#374151" stroke-width="1" stroke-dasharray="3 2"/>
    <text x="1316" y="868">internal link</text>
  </g>
</svg>