site_name: Sarthak AI
site_description: Privacy-first AI learning companion — local, offline-capable, built for any domain
site_url: https://productive-pro.github.io/sarthak/
repo_url: https://github.com/productive-pro/sarthak
repo_name: productive-pro/sarthak
edit_uri: edit/main/docs/

nav:
  - Home: index.md
  - Getting Started:
      - Installation: guides/installation.md
      - Configuration: guides/configuration.md
  - Features:
      - Spaces (Learning Engine): features/spaces.md
      - Agents (Automation): features/agents.md
      - Web UI: features/web.md
      - Terminal UI: features/tui.md
      - MCP Server: features/mcp.md
  - Reference:
      - CLI Reference: reference/cli.md
      - Overview: reference/index.md
      - AI Agent API: reference/sarthak.features.ai.agent.md
      - Config API: reference/sarthak.core.config.md
      - MCP API: reference/sarthak.features.mcp.server.md
      - TUI API: reference/sarthak.features.tui.app.md
      - Web API: reference/sarthak.web.app.md
      - CLI API: reference/sarthak.cli.main.md
  - Architecture:
      - Overview: architecture/overview.md
      - Privacy and Security: architecture/privacy.md
  - Philosophy: philosophy.md
  - Project:
      - Release Notes: release-notes.md
      - Changelog: changelog.md
      - Contributing: contributing.md
      - Publishing to PyPI: guides/publishing.md
      - Docs Development: guides/development.md

theme:
  name: material
  custom_dir: docs/overrides
  language: en
  logo: icons/sarthak_icon.svg
  favicon: icons/sarthak_icon.svg
  features:
    - navigation.instant
    - navigation.instant.progress
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.top
    - toc.follow
    - content.code.copy
    - content.tabs.link
    - search.suggest
    - search.highlight
  palette:
    - scheme: slate
      primary: black
      accent: lime
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
    - scheme: default
      primary: black
      accent: lime
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          paths: [src]
          options:
            show_root_heading: true
            show_root_toc_entry: false
            members_order: source
            docstring_style: google
            show_source: false

markdown_extensions:
  - attr_list
  - md_in_html
  - admonition
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
      pygments_style: monokai

extra_css:
  - stylesheets/extra.css

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/productive-pro/sarthak

copyright: >
  Copyright &copy; 2026 Sarthak AI
